name: Daily Data Refresh

on:
  schedule:
    # Runs at 22:00 UTC Mon–Fri (5:00 PM ET during standard time, 6:00 PM ET during daylight saving time)
    - cron: '0 22 * * 1-5'  # Mon-Fri only
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas sqlalchemy

      - name: Fetch data
        working-directory: data
        run: python fetch_data.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.db
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi

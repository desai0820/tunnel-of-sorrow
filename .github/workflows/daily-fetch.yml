name: Daily Data Refresh

permissions:
  contents: write

on:
  schedule:
    # Runs at 22:00 UTC Mon–Fri (5:00 PM ET during standard time, 6:00 PM ET during daylight saving time)
    - cron: '0 22 * * 1-5'  # Mon-Fri only
  workflow_dispatch:  # manual trigger from GitHub UI

concurrency:
  group: data-refresh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data
        working-directory: data
        run: python fetch_data.py

      - name: Upload DB as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Delete existing 'latest-data' release if it exists
          gh release delete latest-data --yes 2>/dev/null || true
          # Create new release with the DB attached
          gh release create latest-data \
            data/market_data.db \
            --title "Market Data ($DATE)" \
            --notes "Auto-updated VIX/SPX data through $DATE" \
            --latest
